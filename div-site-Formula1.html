<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div E Span</title>
    <!--Ao usar o SPAN , ele fica na mesma linha , nao tem a quebra
    Já a DIV , e como se fosse um bloco criado -->

</head>
<body>
   <!--Cabeçalho-->
   <div style="border-bottom:4px solid red">
         <img src="img/logo-f1.png" width="100" alt="Logo">
             <a href="">Recente</a>
            <a href="">Vídeo</a>
            <a href="">Agenda de corrida</a>
            <a href="">Pilotos</a>
            <span style="background-color: black;color: white;">Grupo Liberty Media</span>
    </div>
<!--Contexto-->
    <div style="background:lightgray">
        <h1>Grandes Pilotos da Formúla 1</h1>
        <p>
            Alguns dos <span style="color: purple;">melhores pilotos</span> da Fórmula 1 , são vistos juntos na foto abaixo
        
        </p>
        <img src="img/pilotos.jpeg" alt="Pilotos">
    
    </div>
<!--Rodape-->
    <div style="background-color: black;color: white;">
       Site Oficial da Fórmula 1



    </div>


</body>
</html>
