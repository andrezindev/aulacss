<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin e Padding</title>
    
    <!--
        PADDING-- ESPACAMENTO DENTRO DO CONTEUDO

        em relacao ao padding nos podemos usar como se fosse na borda , podemos dar o espaco tanto para esquerda , direita, cima ou baixo
        padding-top: 20px;
        padding-bottom: 20px;
        padding-left: 20px;
        padding-right: 20px;
        padding: 10px 30px 50px 10px;  ( aqui nos colocamos os px para cada local , como se fosse nas bordas tambem)

        MARGIN-- ESPACAMENTO ENTRE OS CONTEUDOS OU BLOCOS
        margin -top: 20px;
        margin-bottom: 20px;
        margin-left: 20px;
        margin-right: 20px;
        margin: 10px 30px 50px 10px;
        
        Algo bem interessante é que se nos quisermos usar uma margem onde ela fica bem centralizada e automatica nos usamos

        margin: 1px auto;  por exemplo , definimos um margin para parte superior e inferior e o auto ele fica bem centralizado de acordo com o conteudo

    -->

    <style>
        h2{
            border: 1px solid red;
            width:900px;
            margin: auto;
            padding-left: 330px; 
            

        }
        p{
            border: 1px solid red;
        }



    </style>



</head>
<body>
        <h2>MARGIN E PADDING</h2>
        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Nostrum dignissimos qui quisquam at nihil possimus! Deleniti quaerat expedita sed. Odit fugiat repudiandae, eos culpa maxime cum corporis voluptate expedita quidem!
        </p>






</body>
</html>
